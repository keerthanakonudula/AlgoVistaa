<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoVista — Algorithm Visualizer</title>

<style>
:root {
  /* Backgrounds */
  --bg: #0f172a;
  --surface: #111827;
  --surface2: #1f2937;
  --surface3: #374151;

  /* Borders */
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.18);

  /* Accent Gradient Colors */
  --primary: #38bdf8;
  --secondary: #818cf8;
  --accent: #f472b6;

  /* States */
  --compare-color: #facc15;
  --swap-color: #fb7185;
  --sorted-color: #34d399;
  --pivot-color: #a78bfa;

  /* Text */
  --text: #f9fafb;
  --text2: #9ca3af;
  --text3: #6b7280;
}

/* Reset */
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(180deg,#0f172a,#020617);
  color:var(--text);
  font-family:sans-serif;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  border-bottom:1px solid var(--border);
}
.nav-brand{
  font-weight:bold;
  font-size:1.3rem;
  color:var(--primary);
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}
.hero h1{
  font-size:3rem;
  background:linear-gradient(90deg,#38bdf8,#a78bfa,#f472b6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero p{
  color:var(--text2);
  margin-top:16px;
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:12px 28px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  color:#000;
}

/* CARDS */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  transition:.25s;
}
.card:hover{
  transform:translateY(-4px);
  border-color:var(--primary);
}

/* VISUAL BARS */
.bar{
  width:100%;
  border-radius:6px 6px 0 0;
  background:linear-gradient(180deg,#38bdf8,#a78bfa);
  transition:.2s;
}
.bar.compare{background:var(--compare-color)}
.bar.swap{background:var(--swap-color)}
.bar.sorted{background:var(--sorted-color)}
.bar.pivot{background:var(--pivot-color)}

/* PANEL */
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  padding:20px;
  border-radius:14px;
}

/* BUTTONS */
.ctrl-btn{
  padding:10px 16px;
  border-radius:8px;
  border:1px solid var(--border2);
  background:var(--surface2);
  color:var(--text2);
  cursor:pointer;
}
.ctrl-btn.primary{
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  color:#000;
}

/* INPUT */
input,select{
  background:var(--surface2);
  border:1px solid var(--border2);
  color:white;
  padding:8px;
  border-radius:6px;
}

/* FOOTER */
footer{
  padding:30px;
  text-align:center;
  border-top:1px solid var(--border);
  color:var(--text3);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-brand">AlgoVista</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Visualize Algorithms Beautifully</h1>
  <p>Understand sorting and searching step by step with clean visuals.</p>
  <button class="btn">Start Learning</button>
</div>

<!-- SAMPLE CARD GRID -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:40px;">
  <div class="card">
    <h3>Bubble Sort</h3>
    <p>Simple swapping algorithm</p>
  </div>
  <div class="card">
    <h3>Quick Sort</h3>
    <p>Fast divide & conquer</p>
  </div>
</div>

<!-- VISUAL PANEL -->
<div class="panel" style="margin:40px">
  <div style="display:flex;gap:6px;height:200px;align-items:flex-end;">
    <div class="bar" style="height:40%"></div>
    <div class="bar compare" style="height:70%"></div>
    <div class="bar swap" style="height:55%"></div>
    <div class="bar pivot" style="height:80%"></div>
    <div class="bar sorted" style="height:100%"></div>
  </div>

  <div style="margin-top:20px;display:flex;gap:10px;">
    <button class="ctrl-btn">Prev</button>
    <button class="ctrl-btn primary">Play</button>
    <button class="ctrl-btn">Next</button>
  </div>
</div>

<footer>
  AlgoVista — Clean UI Upgrade ✨
</footer>

</body>
</html>
